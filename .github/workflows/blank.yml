name: 🤖 Android Emulator + VNC

on:
  push:
  workflow_dispatch:

jobs:
  android-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Display + VNC packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc fluxbox wmctrl libpulse0 libnss3 libglu1-mesa
          echo "✅ Packages installed!"

      - name: 💾 Cache AnyDesk APKs
        id: cache-apk
        uses: actions/cache@v4
        with:
          path: ~/anydesk_apk
          key: anydesk-apk-v5

      - name: 📦 Download AnyDesk + Plugin
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/anydesk_apk
          curl -L https://files.catbox.moe/7irxla.apkm -o ~/anydesk_apk/anydesk.apkm
          curl -L https://download.anydesk.com/android/plugins/adcontrol-ad1.apk -o ~/anydesk_apk/adcontrol.apk
          echo "✅ AnyDesk Downloaded!"

      - name: 🖥️ Start Display + Fluxbox + VNC + bore
        run: |
          Xvfb :1 -screen 0 1920x1080x24 &
          export DISPLAY=:1
          sleep 2

          fluxbox &
          sleep 3
          echo "✅ Display + Fluxbox Ready!"

          x11vnc -display :1 -nopw -forever -shared -bg -o /tmp/x11vnc.log -xkb -capslock -skip_lockkeys
          sleep 2
          echo "✅ VNC Started!"

          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx -C /usr/local/bin
          chmod +x /usr/local/bin/bore

          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore.log &
          sleep 5

          echo "============================================"
          echo "📱 PHONE PE YEH KARO:"
          echo "App  : RealVNC / MultiVNC"
          echo "Host : bore.pub"
          echo "Port : (neeche dekho)"
          cat /tmp/bore.log | grep "remote_port\|listening"
          echo "Pass : koi nahi - seedha connect!"
          echo "============================================"

      - name: 📱 Android Emulator — Xvfb :1 pe!
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: :1
        with:
          api-level: 28
          target: google_apis_playstore
          arch: x86_64
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 14G
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect -prop qemu.hw.mainkeys=0
          emulator-boot-timeout: 900
          disable-animations: true
          script: |
            echo "✅ Emulator chal raha hai :1 display pe!"

            mkdir -p /tmp/split_apks && unzip -o ~/anydesk_apk/anydesk.apkm -d /tmp/split_apks && adb install-multiple $(find /tmp/split_apks -name '*.apk' | grep -E '(x86_64|x86|base|\.en\.|xxhdpi|xxxhdpi|mdpi)') && echo "✅ AnyDesk Installed!"

            adb install ~/anydesk_apk/adcontrol.apk && echo "✅ AnyDesk AD Control Plugin Installed!"

            adb shell pm grant com.anydesk.anydeskandroid android.permission.CAMERA && adb shell pm grant com.anydesk.anydeskandroid android.permission.RECORD_AUDIO && adb shell pm grant com.anydesk.anydeskandroid android.permission.READ_EXTERNAL_STORAGE && adb shell pm grant com.anydesk.anydeskandroid android.permission.WRITE_EXTERNAL_STORAGE && adb shell appops set com.anydesk.anydeskandroid SYSTEM_ALERT_WINDOW allow && adb shell appops set com.anydesk.anydeskandroid RUN_IN_BACKGROUND allow && adb shell appops set com.anydesk.anydeskandroid RUN_ANY_IN_BACKGROUND allow && adb shell dumpsys deviceidle whitelist +com.anydesk.anydeskandroid && echo "✅ AnyDesk Permissions Granted!"

            adb shell appops set com.anydesk.adcontrol RUN_IN_BACKGROUND allow && adb shell appops set com.anydesk.adcontrol RUN_ANY_IN_BACKGROUND allow && adb shell dumpsys deviceidle whitelist +com.anydesk.adcontrol && echo "✅ AD Control Plugin Permissions Granted!"

            adb shell monkey -p com.anydesk.anydeskandroid 1 && sleep 3 && echo "📱 Ab phone pe VNC mein Android dikhega!"

            sleep 18000
